name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update manifest versions
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          for ext in chatgpt claude; do
            python3 -c "
          import json, os
          v = os.environ['VERSION']
          with open('extensions/$ext/manifest.json', 'r+') as f:
            m = json.load(f)
            m['version'] = v
            f.seek(0); json.dump(m, f, indent=2); f.truncate()
          print(f'Updated extensions/$ext/manifest.json to {v}')
            "
          done

      - name: Build ZIPs
        run: |
          for ext in chatgpt claude; do
            cd extensions/$ext
            zip -r ../../ferrid-${ext}-v${{ steps.version.outputs.VERSION }}.zip .
            cd ../..
          done
          ls -la ferrid-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ferrid v${{ steps.version.outputs.VERSION }}
          body: |
            ## ferrid v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download the ZIP for your platform below
            2. Unzip it
            3. Open `chrome://extensions` → Developer mode ON
            4. Click "Load unpacked" → select the unzipped folder
            5. Click the ferrid icon in toolbar → enter Notion token → Save

            ### Downloads
            - **ferrid-chatgpt** — for ChatGPT (chatgpt.com)
            - **ferrid-claude** — for Claude (claude.ai)
          files: |
            ferrid-chatgpt-v${{ steps.version.outputs.VERSION }}.zip
            ferrid-claude-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false

      - name: Upload ChatGPT extension to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ferrid-chatgpt-v${{ steps.version.outputs.VERSION }}.zip
          extension-id: ${{ vars.CWS_EXTENSION_ID_CHATGPT }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true

      - name: Upload Claude extension to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ferrid-claude-v${{ steps.version.outputs.VERSION }}.zip
          extension-id: ${{ vars.CWS_EXTENSION_ID_CLAUDE }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
